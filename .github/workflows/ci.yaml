name: CI
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - "lts/*"
          - "lts/-1"
        package:
          - base
          - core
          - cube
          - csvw
          - formats
          - ftp
          - graph-store
          - http
          - n3
          - rdf
          - s3
          - sparql
          - shacl
          - validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npx c8 --all --src packages/${{ matrix.package }} -x "packages/!(${{ matrix.package }})" --reporter lcovonly --reporter text npm run -w barnard59-${{ matrix.package }} test
      - name: Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: barnard59-${{ matrix.package }}

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm run -ws --if-present build

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm run -w barnard59-test-e2e test

  test-otel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - name: Prepare otel data dir
        run: mkdir -p test/e2e/otel-data
      - name: Start OpenTelemetry Collector
        working-directory: test/e2e
        run: |
          docker compose up -d otelcol
          # Wait up to ~20s for health endpoint (fast, readable)
          for i in {1..20}; do
            if curl -fsS http://localhost:13133/healthz >/dev/null; then
              echo "otelcol is ready"; break
            fi
            sleep 1
          done
      - run: npm ci
      - run: npm run -s barnard59-test-e2e clock -- --otel-traces-exporter otlp
        working-directory: test/e2e
        env:
          OTEL_TRACES_EXPORTER: otlp
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318
          OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
          OTEL_RESOURCE_ATTRIBUTES: service.name=barnard59-ci
      - name: Assert collected traces exist
        working-directory: test/e2e
        run: |
          set -euo pipefail
          FILE=otel-data/traces.json
          # Wait up to 10s for flush
          for i in {1..10}; do [ -s "$FILE" ] && break; sleep 1; done
          test -s "$FILE" || { echo "No traces written to $FILE" >&2; exit 1; }
          # Optional minimal sanity: peek a bit for debug context
          sed -n '1,80p' "$FILE"
      - name: Collector logs (on failure)
        if: failure()
        working-directory: test/e2e
        run: docker compose logs --no-color otelcol || true
      - name: Stop Collector
        if: always()
        working-directory: test/e2e
        run: docker compose down -v || true

  test-cli:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - "lts/*"
          - "lts/-1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Compile TypeScript packages
        run: npm run -ws --if-present build -- --sourceMap
      - run: npx c8 --all --src packages/cli -x "packages/!(cli)" --reporter lcovonly --reporter text npm run -w barnard59 test
      - name: Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: barnard59

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm run lint

  ensure-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: node .github/ensureManifests.js

  smoke-test-cli:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npx barnard59 run test/e2e/definitions/file-loader.ttl
      - run: npx barnard59 run test/e2e/definitions/foreach/with-handler.ttl
      - run: npx barnard59 run test/e2e/definitions/foreach/with-variable.ttl --variable pattern="test/e2e/definitions/foreach/*"
      - run: npx barnard59 run test/e2e/definitions/foreach/csv-duplicate.ttl --variable filename=test/e2e/data/test.csv
      - run: npx barnard59 run test/e2e/definitions/world-clock/async.ttl
      - run: npx barnard59 run test/e2e/definitions/world-clock/file.ttl
      - run: npx barnard59 run test/e2e/definitions/world-clock/node.ttl
      - run: npx barnard59 run test/e2e/definitions/code-imports/main.ttl

  global-installation:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - name: pack all
        run: npm pack -ws
      - run: npm install -g barnard59-*.tgz
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
      - run: cmd /c npm install -g (Get-ChildItem -Filter barnard59-*.tgz).FullName
        if: matrix.os == 'windows-latest'
      - run: which barnard59
      - run: barnard59 --help
      - run: barnard59 shacl validate --shapes test/support/pipeline-shapes.ttl < test/e2e/definitions/file-loader.ttl
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
      - run: barnard59 shacl validate --shapes test/support/pipeline-shapes.ttl < test/e2e/definitions/file-loader.ttl
        if: matrix.os == 'windows-latest'
        shell: cmd
